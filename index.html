<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF Watermark Tool with Position & Original Preview</title>
  <!-- pdf-lib for watermarking -->
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <!-- pdf.js for preview -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.432/pdf.min.mjs" type="module"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f0f17; color: #e0e0ff; padding: 30px; max-width: 950px; margin: auto; text-align: center; }
    h1 { color: #a5b4fc; }
    .container { background: #1e1e38; padding: 30px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    #drop-zone { 
      border: 3px dashed #6366f1; 
      border-radius: 12px; 
      padding: 80px 20px; 
      margin: 25px 0; 
      cursor: pointer; 
      transition: all 0.25s; 
      background: rgba(99,102,241,0.05); 
      min-height: 200px;
    }
    #drop-zone:hover, #drop-zone.active { 
      background: rgba(99,102,241,0.2) !important; 
      border-color: #818cf8 !important; 
      box-shadow: 0 0 15px rgba(99,102,241,0.4);
    }
    button { background: #6366f1; color: white; border: none; padding: 14px 28px; font-size: 1.1rem; border-radius: 8px; margin: 10px; cursor: pointer; }
    button:hover { background: #4f46e5; }
    button:disabled { background: #444; cursor: not-allowed; }
    #addWatermarkBtn { background: #ec4899; }
    #addWatermarkBtn:hover { background: #db2777; }
    #status { margin: 20px 0; font-size: 1.1rem; min-height: 1.5em; }
    .success { color: #10b981; }
    .error   { color: #ef4444; }
    .info    { color: #fbbf24; }
    input, select { padding: 10px; margin: 8px; font-size: 1rem; border-radius: 6px; border: 1px solid #6366f1; background: #2d2d4a; color: white; }
    .section { margin: 25px 0; padding: 15px; background: #25253a; border-radius: 10px; }
    #previewContainer { margin-top: 30px; display: none; }
    #previewCanvas { max-width: 100%; border: 2px solid #6366f1; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
  </style>
</head>
<body>

  <h1>PDF Watermark Tool – Custom Position + Original Preview</h1>
  <p style="color:#94a3b8;">Add text/image watermark • See original first page preview • 100% browser-only</p>

  <div class="container">
    <div id="drop-zone">
      <p>Click here to select PDF<br>or drag & drop your PDF file</p>
    </div>

    <div id="file-info" style="display:none; margin:20px 0;">
      <strong>File:</strong> <span id="file-name"></span><br>
      <strong>Pages:</strong> <span id="page-count">—</span>
    </div>

    <button id="previewOriginalBtn" disabled>Show Original First Page Preview</button>

    <!-- Sections for text and image watermark (same as before, omitted for brevity) -->
    <div class="section">
      <h3>Text Watermark</h3>
      <!-- ... your existing inputs for text watermark ... -->
    </div>

    <div class="section">
      <h3>Image Watermark</h3>
      <!-- ... your existing inputs for image watermark ... -->
    </div>

    <button id="addWatermarkBtn" disabled>Add Watermark & Download</button>

    <div id="status"></div>

    <div id="previewContainer">
      <h3>Original First Page Preview (before watermark)</h3>
      <canvas id="previewCanvas"></canvas>
    </div>
  </div>

  <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.432/pdf.min.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.432/pdf.worker.min.mjs';

    const dropZone = document.getElementById('drop-zone');
    const status = document.getElementById('status');
    const previewOriginalBtn = document.getElementById('previewOriginalBtn');
    const addBtn = document.getElementById('addWatermarkBtn');
    // ... other element vars as before ...

    let pdfBytes = null;
    let pdfDoc = null;
    let pdfjsDoc = null;
    let totalPages = 0;

    // Enhanced drag & drop with more preventDefault + logs
    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
      console.log('Drag event prevented:', e.type);
    }

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      dropZone.addEventListener(eventName, preventDefaults, false);
    });

    ['dragenter', 'dragover'].forEach(eventName => {
      dropZone.addEventListener(eventName, () => {
        dropZone.classList.add('active');
        showStatus('Drop PDF here...', 'info');
      }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropZone.addEventListener(eventName, () => {
        dropZone.classList.remove('active');
      }, false);
    });

    dropZone.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
      console.log('Drop event fired!', e.dataTransfer.files);
      const dt = e.dataTransfer;
      const files = dt.files;
      if (files.length) {
        handleFile(files[0]);
      } else {
        showStatus('No file dropped – try again', 'error');
      }
    }

    // Click to open file picker
    dropZone.addEventListener('click', () => {
      console.log('Click on drop-zone – opening file picker');
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'application/pdf';
      input.onchange = e => {
        if (e.target.files.length) {
          console.log('File selected via click:', e.target.files[0].name);
          handleFile(e.target.files[0]);
        }
      };
      input.click();
    });

    async function handleFile(file) {
      if (!file || file.type !== 'application/pdf') {
        showStatus('Please select a valid PDF file', 'error');
        return;
      }

      showStatus('Loading PDF...', 'info');

      const arrayBuffer = await file.arrayBuffer();
      pdfBytes = new Uint8Array(arrayBuffer);

      try {
        pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
        totalPages = pdfDoc.getPageCount();

        pdfjsDoc = await pdfjsLib.getDocument({ data: pdfBytes }).promise;

        document.getElementById('file-name').textContent = file.name;
        document.getElementById('page-count').textContent = totalPages;
        document.getElementById('file-info').style.display = 'block';

        previewOriginalBtn.disabled = false;
        addBtn.disabled = false;

        showStatus(`PDF loaded successfully – ${totalPages} page(s)`, 'success');
      } catch (err) {
        showStatus('Error loading PDF – try a different file', 'error');
        console.error('PDF load error:', err);
      }
    }

    function showStatus(msg, type = 'info') {
      status.textContent = msg;
      status.className = type;
    }

    // Preview and watermark functions remain the same as in previous code...
    // (paste your existing previewBtn.onclick and addWatermarksAndDownload here)

    previewOriginalBtn.onclick = async () => { /* your existing preview code */ };
    addBtn.onclick = addWatermarksAndDownload; /* your existing function */

  </script>
</body>
</html>
